name: Import Archive and Create Repository (Git Method)

on:
  workflow_dispatch:
    inputs:
      repo_name:
        description: 'Name for the new repository (must be unique)'
        required: true
        default: 'imported-content'
      source_type:
        description: 'Source archive type'
        required: true
        type: choice
        options:
          - zip
          - xml
        default: zip
      source_url:
        description: 'URL of the source archive'
        required: true
      repo_description:
        description: 'Description for the new repository'
        required: false
        default: 'Repository created from imported ZIP or XML archive'
      private_repo:
        description: 'Make repository private?'
        required: true
        type: boolean
        default: false

jobs:
  create-repo-from-archive:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      GIT_TERMINAL_PROMPT: 0

    steps:
      - name: Validate inputs
        env:
          REPO_CREATE_TOKEN: ${{ secrets.REPO_CREATE_TOKEN }}
        run: |
          set -euo pipefail
          echo "🔍 Validating inputs..."
          echo "Repository name: ${{ inputs.repo_name }}"
          echo "Source type: ${{ inputs.source_type }}"
          echo "Source URL: ${{ inputs.source_url }}"
          echo "Private: ${{ inputs.private_repo }}"

          if [[ -z "${REPO_CREATE_TOKEN:-}" ]]; then
            echo "❌ Error: Secret REPO_CREATE_TOKEN is not set. Please add a Personal Access Token with repo scope."
            exit 1
          fi

          if [[ ! "${{ inputs.repo_name }}" =~ ^[a-zA-Z0-9_-]+$ ]]; then
            echo "❌ Error: Repository name can only contain alphanumeric characters, hyphens, and underscores"
            exit 1
          fi

          source_url_trimmed="$(printf '%s' "${{ inputs.source_url }}" | xargs)"
          if [[ -z "$source_url_trimmed" ]]; then
            echo "❌ Error: source_url cannot be empty"
            exit 1
          fi

      - name: Download source archive
        id: source
        run: |
          set -euo pipefail
          source_type="${{ inputs.source_type }}"
          source_url="$(printf '%s' "${{ inputs.source_url }}" | xargs)"

          case "$source_type" in
            zip)
              echo "📥 Downloading ZIP archive from $source_url"
              curl --fail --location --retry 3 --retry-all-errors --connect-timeout 30 --max-time 300 -o archive.zip "$source_url"
              [[ -s archive.zip ]] || { echo "❌ Downloaded ZIP file is empty"; exit 1; }
              echo "✅ Downloaded ZIP file ($(du -h archive.zip | cut -f1))"
              ;;
            xml)
              echo "📥 Downloading XML archive from $source_url"
              curl --fail --location --retry 3 --retry-all-errors --connect-timeout 30 --max-time 300 -o archive.xml "$source_url"
              [[ -s archive.xml ]] || { echo "❌ Downloaded XML file is empty"; exit 1; }
              echo "✅ Downloaded XML file ($(du -h archive.xml | cut -f1))"
              ;;
          esac

          printf 'source_type=%s\n' "$source_type" >> "$GITHUB_OUTPUT"
          printf 'source_url=%s\n' "$source_url" >> "$GITHUB_OUTPUT"

      - name: Build XML-to-ZIP converter
        if: steps.source.outputs.source_type == 'xml'
        run: |
          set -euo pipefail
          cat > xml_to_zip_stream.py <<'PY'
          #!/usr/bin/env python3
          import argparse
          import io
          import re
          import sys
          import zipfile
          from pathlib import Path

          OPEN_RE = re.compile(r'^\ufeff?<file path="([^"]+)">\r?\n?$')
          CLOSE_TAG = "</file>"

          def stream_xml_to_zip(xml_path: Path, zip_path: Path) -> int:
              current_path = None
              buffer = None
              count = 0

              with xml_path.open("r", encoding="utf-8", errors="surrogateescape", newline="") as src, \
                   zipfile.ZipFile(zip_path, "w", compression=zipfile.ZIP_DEFLATED) as zf:
                  for line in src:
                      if current_path is None:
                          match = OPEN_RE.match(line)
                          if match:
                              current_path = match.group(1)
                              buffer = io.StringIO()
                          continue

                      if line.rstrip("\r\n") == CLOSE_TAG:
                          data = buffer.getvalue()
                          if data.startswith("\r\n"):
                              data = data[2:]
                          elif data.startswith("\n"):
                              data = data[1:]
                          zf.writestr(current_path, data.encode("utf-8", errors="surrogateescape"))
                          current_path = None
                          buffer = None
                          count += 1
                      else:
                          buffer.write(line)

              if current_path is not None:
                  raise RuntimeError(f"Unclosed <file> block for {current_path!r}")

              return count

          def main() -> int:
              parser = argparse.ArgumentParser(description="Convert a line-oriented XML file archive into a ZIP archive.")
              parser.add_argument("xml_path")
              parser.add_argument("zip_path")
              args = parser.parse_args()

              xml_path = Path(args.xml_path)
              zip_path = Path(args.zip_path)

              if not xml_path.is_file():
                  print(f"Input XML file not found: {xml_path}", file=sys.stderr)
                  return 1

              count = stream_xml_to_zip(xml_path, zip_path)
              print(f"✅ Wrote {count} files to {zip_path}")
              return 0

          if __name__ == "__main__":
              raise SystemExit(main())
          PY
          chmod +x xml_to_zip_stream.py

      - name: Convert XML archive to ZIP
        if: steps.source.outputs.source_type == 'xml'
        run: |
          set -euo pipefail
          echo "🛠️ Converting XML archive to ZIP..."
          python3 xml_to_zip_stream.py archive.xml archive.zip
          [[ -s archive.zip ]] || { echo "❌ Generated ZIP file is empty"; exit 1; }
          echo "✅ Generated ZIP file ($(du -h archive.zip | cut -f1))"

      - name: Extract ZIP contents
        run: |
          set -euo pipefail
          echo "📦 Extracting ZIP file..."
          rm -rf extracted_content
          mkdir -p extracted_content

          if ! unzip -q archive.zip -d extracted_content; then
            echo "❌ Failed to extract ZIP file"
            exit 1
          fi

          file_count=$(find extracted_content -type f | wc -l | tr -d ' ')
          if [[ "$file_count" -eq 0 ]]; then
            echo "❌ No files found in archive"
            exit 1
          fi

          echo "🔎 Checking for oversized files (>99MB)..."
          if find extracted_content -type f -size +99M -print -quit | grep -q .; then
            echo "❌ Found files larger than 99MB. GitHub blocks pushing files over 100MB."
            echo "Offending files:"
            find extracted_content -type f -size +99M -printf '%p (%s bytes)\n'
            exit 1
          fi

          echo "✅ Extracted $file_count files"
          echo "📂 Directory structure:"
          tree -L 3 extracted_content/ || ls -R extracted_content/

      - name: Create repository via API
        id: create-repo
        uses: actions/github-script@v8
        env:
          REPO_NAME: ${{ inputs.repo_name }}
          REPO_DESCRIPTION: ${{ inputs.repo_description }}
          PRIVATE_REPO: ${{ inputs.private_repo }}
        with:
          github-token: ${{ secrets.REPO_CREATE_TOKEN }}
          retries: 3
          result-encoding: string
          script: |
            const repoName = process.env.REPO_NAME;
            const repoDescription = process.env.REPO_DESCRIPTION;
            const isPrivate = process.env.PRIVATE_REPO === 'true';

            const { data: user } = await github.rest.users.getAuthenticated();
            console.log(`🔐 Authenticated as: ${user.login}`);

            try {
              console.log(`📝 Creating repository: ${user.login}/${repoName}`);

              const { data: repo } = await github.rest.repos.createForAuthenticatedUser({
                name: repoName,
                description: repoDescription,
                private: isPrivate,
                auto_init: false,
                has_issues: true,
                has_projects: true,
                has_wiki: true
              });

              console.log(`✅ Repository created: ${repo.html_url}`);
              console.log(`📋 Clone URL: ${repo.clone_url}`);
              core.setOutput('clone_url', repo.clone_url);
              core.setOutput('html_url', repo.html_url);
              return repo.clone_url;
            } catch (error) {
              if (error.status === 422) {
                core.setFailed(`Repository '${repoName}' already exists in your account. Please choose a different name or delete the existing repository.`);
              } else if (error.status === 401) {
                core.setFailed('Authentication failed. Please verify your REPO_CREATE_TOKEN secret has the correct permissions.');
              } else {
                core.setFailed(`Failed to create repository: ${error.message}`);
              }
              throw error;
            }

      - name: Initialize git and push content
        env:
          REPO_URL: ${{ steps.create-repo.outputs.clone_url }}
          GITHUB_TOKEN: ${{ secrets.REPO_CREATE_TOKEN }}
        run: |
          set -euo pipefail
          cd extracted_content

          echo "🧹 Removing any embedded git metadata..."
          find . -type d -name .git -prune -exec rm -rf {} +

          echo "📋 Initializing repository..."
          git init -b main

          echo "🔧 Configuring git..."
          git config --local user.name "github-actions[bot]"
          git config --local user.email "github-actions[bot]@users.noreply.github.com"

          echo "* text=auto" > .gitattributes

          echo "➕ Adding all files..."
          git add --all

          echo "💾 Creating initial commit..."
          COMMIT_TS="$(date -u +"%Y-%m-%d %H:%M:%S UTC")"
          git commit \
            -m "Initial commit: Add files from imported archive" \
            -m "Source type: ${{ steps.source.outputs.source_type }}" \
            -m "Source: ${{ steps.source.outputs.source_url }}" \
            -m "Extracted: ${COMMIT_TS}" \
            -m "Workflow: ${{ github.repository }}@${{ github.sha }}"

          echo "🔗 Adding remote..."
          REPO_URL_SANITIZED=$(echo "$REPO_URL" | sed 's/^"\(.*\)"$/\1/')
          REPO_URL_WITH_TOKEN=$(echo "$REPO_URL_SANITIZED" | sed "s|https://|https://x-access-token:${GITHUB_TOKEN}@|")
          git remote add origin "$REPO_URL_WITH_TOKEN"

          echo "⬆️ Pushing to remote..."
          git push --verbose -u origin main

      - name: Generate summary
        if: success()
        env:
          REPO_URL: ${{ steps.create-repo.outputs.html_url }}
        run: |
          set -euo pipefail
          REPO_URL_SANITIZED=$(echo "$REPO_URL" | sed 's/^"\(.*\)"$/\1/')
          if [[ "${{ inputs.private_repo }}" == "true" ]]; then
            VISIBILITY="Private"
          else
            VISIBILITY="Public"
          fi

          {
            echo "## ✅ Workflow Completed Successfully!"
            echo
            echo "### Repository Details"
            echo "- **Name:** ${{ inputs.repo_name }}"
            echo "- **URL:** [View Repository](${REPO_URL_SANITIZED%.git})"
            echo "- **Visibility:** ${VISIBILITY}"
            echo
            echo "### Source"
            echo "- **Type:** ${{ steps.source.outputs.source_type }}"
            echo "- **URL:** ${{ steps.source.outputs.source_url }}"
            echo
            echo "🎉 All files from the provided archive have been imported and pushed to the new repository!"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Cleanup failure
        if: failure() && steps.create-repo.outcome == 'success'
        uses: actions/github-script@v8
        env:
          REPO_NAME: ${{ inputs.repo_name }}
        with:
          github-token: ${{ secrets.REPO_CREATE_TOKEN }}
          script: |
            const repoName = process.env.REPO_NAME;
            const { data: user } = await github.rest.users.getAuthenticated();

            try {
              await github.rest.repos.get({
                owner: user.login,
                repo: repoName
              });

              console.log(`⚠️ Repository ${user.login}/${repoName} was created but workflow failed later.`);
              console.log(`Consider deleting it manually if needed: https://github.com/${user.login}/${repoName}/settings`);
            } catch (error) {
              console.log('No repository cleanup needed.');
            }
